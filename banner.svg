<svg width="1500" height="500" viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="30%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>

    <!-- Ambient glow on left -->
    <radialGradient id="leftGlow" cx="20%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>

    <!-- Right ambient glow -->
    <radialGradient id="rightGlow" cx="80%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#1e1b4b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>

    <!-- Blue glow filter for text -->
    <filter id="blueGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.345  0 0 0 0 0.651  0 0 0 0 1  0 0 0 0.9 0" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Soft glow for nodes -->
    <filter id="nodeGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Cyan node glow -->
    <filter id="cyanGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.133  0 0 0 0 0.827  0 0 0 0 0.933  0 0 0 1 0" result="c"/>
      <feMerge><feMergeNode in="c"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="clip"><rect width="1500" height="500" rx="0"/></clipPath>
    <!-- Typewriter clip paths — 20s cycle, lines type in sequentially -->
    <clipPath id="tc1" ><rect x="735" y="75"  width="0" height="24"><animate attributeName="width" values="0;0;500;500;0;0" keyTimes="0;0.015;0.055;0.70;0.80;1" dur="20s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="tc2" ><rect x="735" y="95"  width="0" height="24"><animate attributeName="width" values="0;0;500;500;0;0" keyTimes="0;0.060;0.100;0.70;0.80;1" dur="20s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="tc3" ><rect x="735" y="115" width="0" height="24"><animate attributeName="width" values="0;0;500;500;0;0" keyTimes="0;0.105;0.145;0.70;0.80;1" dur="20s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="tc4" ><rect x="735" y="135" width="0" height="24"><animate attributeName="width" values="0;0;500;500;0;0" keyTimes="0;0.150;0.190;0.70;0.80;1" dur="20s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="tc5" ><rect x="735" y="155" width="0" height="24"><animate attributeName="width" values="0;0;500;500;0;0" keyTimes="0;0.195;0.235;0.70;0.80;1" dur="20s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="tc6" ><rect x="735" y="175" width="0" height="24"><animate attributeName="width" values="0;0;500;500;0;0" keyTimes="0;0.240;0.280;0.70;0.80;1" dur="20s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="tc7" ><rect x="735" y="195" width="0" height="24"><animate attributeName="width" values="0;0;500;500;0;0" keyTimes="0;0.285;0.325;0.70;0.80;1" dur="20s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="tc8" ><rect x="735" y="215" width="0" height="24"><animate attributeName="width" values="0;0;500;500;0;0" keyTimes="0;0.330;0.370;0.70;0.80;1" dur="20s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="tc9" ><rect x="735" y="245" width="0" height="24"><animate attributeName="width" values="0;0;500;500;0;0" keyTimes="0;0.375;0.415;0.70;0.80;1" dur="20s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="tc10"><rect x="735" y="265" width="0" height="24"><animate attributeName="width" values="0;0;500;500;0;0" keyTimes="0;0.420;0.460;0.70;0.80;1" dur="20s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="tc11"><rect x="735" y="285" width="0" height="24"><animate attributeName="width" values="0;0;500;500;0;0" keyTimes="0;0.465;0.505;0.70;0.80;1" dur="20s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="tc12"><rect x="735" y="305" width="0" height="24"><animate attributeName="width" values="0;0;500;500;0;0" keyTimes="0;0.510;0.550;0.70;0.80;1" dur="20s" repeatCount="indefinite"/></rect></clipPath>
  </defs>

  <!-- ─── BACKGROUND ─── -->
  <rect width="1500" height="500" fill="url(#bgGrad)"/>
  <rect width="1500" height="500" fill="url(#leftGlow)"/>
  <rect width="1500" height="500" fill="url(#rightGlow)"/>

  <!-- Subtle grid -->
  <g stroke="#58a6ff" stroke-width="0.3" opacity="0.06" clip-path="url(#clip)">
    <line x1="0" y1="50"  x2="1500" y2="50"/>
    <line x1="0" y1="100" x2="1500" y2="100"/>
    <line x1="0" y1="150" x2="1500" y2="150"/>
    <line x1="0" y1="200" x2="1500" y2="200"/>
    <line x1="0" y1="250" x2="1500" y2="250"/>
    <line x1="0" y1="300" x2="1500" y2="300"/>
    <line x1="0" y1="350" x2="1500" y2="350"/>
    <line x1="0" y1="400" x2="1500" y2="400"/>
    <line x1="0" y1="450" x2="1500" y2="450"/>
    <line x1="100"  y1="0" x2="100"  y2="500"/>
    <line x1="200"  y1="0" x2="200"  y2="500"/>
    <line x1="300"  y1="0" x2="300"  y2="500"/>
    <line x1="400"  y1="0" x2="400"  y2="500"/>
    <line x1="500"  y1="0" x2="500"  y2="500"/>
    <line x1="600"  y1="0" x2="600"  y2="500"/>
    <line x1="700"  y1="0" x2="700"  y2="500"/>
    <line x1="800"  y1="0" x2="800"  y2="500"/>
    <line x1="900"  y1="0" x2="900"  y2="500"/>
    <line x1="1000" y1="0" x2="1000" y2="500"/>
    <line x1="1100" y1="0" x2="1100" y2="500"/>
    <line x1="1200" y1="0" x2="1200" y2="500"/>
    <line x1="1300" y1="0" x2="1300" y2="500"/>
    <line x1="1400" y1="0" x2="1400" y2="500"/>
  </g>

  <!-- ─── FLOATING PARTICLES ─── -->
  <g clip-path="url(#clip)" fill="#58a6ff">
    <circle cx="720" cy="60"  r="2.5" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="3.1s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0,0;0,-12;0,0" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="820" cy="120" r="1.8" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="4.2s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0,0;0,-8;0,0" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="650" cy="400" r="2"   opacity="0.6"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="3.8s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0,0;0,-10;0,0" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="460" r="1.5" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="5.0s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0,0;0,-6;0,0" dur="5.0s" repeatCount="indefinite"/></circle>
    <circle cx="930" cy="80"  r="2"   opacity="0.6"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.9s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0,0;0,-9;0,0" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="580" cy="200" r="1.5" opacity="0.4"><animate attributeName="opacity" values="0.4;0.8;0.4" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="380" r="2.5" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.5s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0,0;4,-8;0,0" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="690" cy="310" r="1.8" opacity="0.3"><animate attributeName="opacity" values="0.3;0.7;0.3" dur="6.0s" repeatCount="indefinite"/></circle>
  </g>

  <!-- ─── SCATTER PLOT (middle-right background) ─── -->
  <g clip-path="url(#clip)" opacity="0.55">
    <!-- cyan dots -->
    <circle cx="930" cy="300" r="4" fill="#22d3ee" filter="url(#cyanGlow)"><animate attributeName="r" values="4;5.5;4" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="970" cy="260" r="3" fill="#22d3ee" opacity="0.8"><animate attributeName="r" values="3;4.5;3" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="1010" cy="290" r="5" fill="#22d3ee" opacity="0.7"><animate attributeName="r" values="5;6.5;5" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="950"  cy="340" r="3" fill="#22d3ee" opacity="0.6"><animate attributeName="r" values="3;4;3" dur="4.0s" repeatCount="indefinite"/></circle>
    <circle cx="990"  cy="320" r="4" fill="#22d3ee" opacity="0.9"><animate attributeName="r" values="4;5;4" dur="3.6s" repeatCount="indefinite"/></circle>
    <!-- blue dots -->
    <circle cx="1040" cy="270" r="3.5" fill="#58a6ff" opacity="0.8"><animate attributeName="r" values="3.5;5;3.5" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="1070" cy="310" r="4"   fill="#58a6ff" opacity="0.7"><animate attributeName="r" values="4;5.5;4" dur="3.0s" repeatCount="indefinite"/></circle>
    <circle cx="1030" cy="350" r="3"   fill="#58a6ff" opacity="0.5"><animate attributeName="r" values="3;4.5;3" dur="4.1s" repeatCount="indefinite"/></circle>
    <!-- purple dots -->
    <circle cx="1060" cy="240" r="4"   fill="#a78bfa" opacity="0.7"><animate attributeName="r" values="4;5.5;4" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="940"  cy="270" r="3"   fill="#a78bfa" opacity="0.6"><animate attributeName="r" values="3;4;3" dur="3.9s" repeatCount="indefinite"/></circle>
    <!-- regression line -->
    <line x1="920" y1="360" x2="1075" y2="230" stroke="#58a6ff" stroke-width="1.5" opacity="0.4" stroke-dasharray="6,4"/>
  </g>

  <!-- ─── ANIMATED BAR CHART (bottom-right) ─── -->
  <g transform="translate(1130, 200)" clip-path="url(#clip)">
    <!-- axis -->
    <line x1="0" y1="220" x2="280" y2="220" stroke="#58a6ff" stroke-width="1.2" opacity="0.3"/>
    <line x1="0" y1="0"   x2="0"   y2="222" stroke="#58a6ff" stroke-width="1.2" opacity="0.3"/>
    <!-- bars -->
    <rect x="15"  y="220" width="32" height="0" fill="#58a6ff" opacity="0.7" rx="2">
      <animate attributeName="y"      values="220;80;220"  dur="4s" begin="0.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1"/>
      <animate attributeName="height" values="0;140;0"     dur="4s" begin="0.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1"/>
    </rect>
    <rect x="57"  y="220" width="32" height="0" fill="#22d3ee" opacity="0.7" rx="2">
      <animate attributeName="y"      values="220;110;220" dur="4s" begin="0.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1"/>
      <animate attributeName="height" values="0;110;0"     dur="4s" begin="0.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1"/>
    </rect>
    <rect x="99"  y="220" width="32" height="0" fill="#a78bfa" opacity="0.7" rx="2">
      <animate attributeName="y"      values="220;50;220"  dur="4s" begin="0.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1"/>
      <animate attributeName="height" values="0;170;0"     dur="4s" begin="0.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1"/>
    </rect>
    <rect x="141" y="220" width="32" height="0" fill="#58a6ff" opacity="0.7" rx="2">
      <animate attributeName="y"      values="220;130;220" dur="4s" begin="1.1s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1"/>
      <animate attributeName="height" values="0;90;0"      dur="4s" begin="1.1s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1"/>
    </rect>
    <rect x="183" y="220" width="32" height="0" fill="#22d3ee" opacity="0.7" rx="2">
      <animate attributeName="y"      values="220;90;220"  dur="4s" begin="1.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1"/>
      <animate attributeName="height" values="0;130;0"     dur="4s" begin="1.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1"/>
    </rect>
    <rect x="225" y="220" width="32" height="0" fill="#a78bfa" opacity="0.7" rx="2">
      <animate attributeName="y"      values="220;70;220"  dur="4s" begin="1.7s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1"/>
      <animate attributeName="height" values="0;150;0"     dur="4s" begin="1.7s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1"/>
    </rect>
  </g>

  <!-- ─── NEURAL NETWORK (far right) ─── -->
  <!-- Layer 1 nodes: x=870 -->
  <g clip-path="url(#clip)">
    <!-- connections L1→L2 -->
    <g stroke="#58a6ff" stroke-width="0.8" opacity="0.25">
      <line x1="870" y1="100" x2="920" y2="130"/><line x1="870" y1="100" x2="920" y2="195"/>
      <line x1="870" y1="165" x2="920" y2="130"/><line x1="870" y1="165" x2="920" y2="195"/>
      <line x1="870" y1="230" x2="920" y2="130"/><line x1="870" y1="230" x2="920" y2="195"/>
      <line x1="870" y1="165" x2="920" y2="260"/>
      <line x1="870" y1="230" x2="920" y2="260"/>
      <animate attributeName="opacity" values="0.25;0.5;0.25" dur="3s" repeatCount="indefinite"/>
    </g>
    <!-- L1 nodes -->
    <circle cx="870" cy="100" r="7" fill="#58a6ff" filter="url(#nodeGlow)" opacity="0.9"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="870" cy="165" r="7" fill="#58a6ff" filter="url(#nodeGlow)" opacity="0.9"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="870" cy="230" r="7" fill="#58a6ff" filter="url(#nodeGlow)" opacity="0.9"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="2.8s" repeatCount="indefinite"/></circle>
    <!-- L2 nodes -->
    <circle cx="920" cy="130" r="6" fill="#22d3ee" filter="url(#cyanGlow)" opacity="0.9"><animate attributeName="opacity" values="0.9;0.3;0.9" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="920" cy="195" r="6" fill="#22d3ee" filter="url(#cyanGlow)" opacity="0.9"><animate attributeName="opacity" values="0.9;0.3;0.9" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="920" cy="260" r="6" fill="#22d3ee" filter="url(#cyanGlow)" opacity="0.9"><animate attributeName="opacity" values="0.9;0.3;0.9" dur="2.6s" repeatCount="indefinite"/></circle>
  </g>

  <!-- ─── DIVIDER LINE ─── -->
  <line x1="710" y1="60" x2="710" y2="440" stroke="#58a6ff" stroke-width="0.8" opacity="0.15"/>

  <!-- ─── TYPEWRITER CODE ANIMATION ─── -->
  <g font-family="monospace" font-size="11" fill="#58a6ff">
    <text x="740" y="90"  opacity="0.30" clip-path="url(#tc1)" >import pandas as pd</text>
    <text x="740" y="110" opacity="0.30" clip-path="url(#tc2)" >import numpy as np</text>
    <text x="740" y="130" opacity="0.30" clip-path="url(#tc3)" >from sklearn.ensemble import RandomForestClassifier</text>
    <text x="740" y="150" opacity="0.30" clip-path="url(#tc4)" >model = RandomForestClassifier(n_estimators=100)</text>
    <text x="740" y="170" opacity="0.30" clip-path="url(#tc5)" >model.fit(X_train, y_train)</text>
    <text x="740" y="190" opacity="0.30" clip-path="url(#tc6)" >y_pred = model.predict(X_test)</text>
    <text x="740" y="210" opacity="0.30" clip-path="url(#tc7)" >accuracy = accuracy_score(y_test, y_pred)</text>
    <text x="740" y="230" opacity="0.30" clip-path="url(#tc8)" >print(f"Accuracy: {accuracy:.4f}")</text>
    <text x="740" y="260" opacity="0.30" clip-path="url(#tc9)" >df = pd.read_csv("data.csv")</text>
    <text x="740" y="280" opacity="0.30" clip-path="url(#tc10)">df.dropna(inplace=True)</text>
    <text x="740" y="300" opacity="0.30" clip-path="url(#tc11)">X = df.drop("target", axis=1)</text>
    <text x="740" y="320" opacity="0.30" clip-path="url(#tc12)">y = df["target"]</text>
  </g>

  <!-- ─── LEFT SIDE CONTENT ─── -->
  <!-- Name with glow + fade-in -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="1.5s" fill="freeze"/>
    <text x="80" y="210" font-family="Arial Black, Arial, sans-serif" font-size="78"
          font-weight="900" fill="#ffffff" filter="url(#blueGlow)" letter-spacing="2">
      HIMEL DAS
    </text>
    <!-- Blue accent underline -->
    <rect x="80" y="222" width="420" height="3" fill="#58a6ff" rx="2">
      <animate attributeName="width" values="0;420" dur="1.2s" begin="0.5s" fill="freeze"/>
    </rect>
  </g>

  <!-- Tagline with delayed fade-in -->
  <text x="82" y="268" font-family="Arial, sans-serif" font-size="19"
        fill="#c9d1d9" letter-spacing="0.8" opacity="0">
    Turning data into decisions, and complexity into clarity
    <animate attributeName="opacity" values="0;1" dur="1.5s" begin="1s" fill="freeze"/>
  </text>



  <!-- Social links row -->
  <g opacity="0" font-family="Arial, sans-serif" font-size="13" fill="#8b949e">
    <animate attributeName="opacity" values="0;1" dur="1.2s" begin="1.5s" fill="freeze"/>
    <text x="82"  y="315">📧 himeldas077@gmail.com</text>
    <text x="310" y="315">🌐 himelds.github.io</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="490" width="1500" height="3" fill="url(#bgGrad)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="2s" begin="0.5s" fill="freeze"/>
  </rect>
  <rect x="0" y="493" width="0" height="4" fill="#58a6ff" opacity="0.7" rx="0">
    <animate attributeName="width" values="0;1500" dur="2.5s" begin="0.3s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
</svg>
